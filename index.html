<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ghadeer</title>
    <style>
        :root {
            --primary-color: #ff4b4b;
            --bg-color: #1a1a1d;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .image-container {
            width: 300px;
            height: 300px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #2a2a2e;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #reaction-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Hidden until first click or set default */
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 150px;
            position: relative;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
        }

        #btn-yes {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            transform: scale(0.6); /* Starts weirdly small */
        }

        #btn-no {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 40px;
            font-size: 2rem;
            transform: scale(1.5); /* Starts unusually large */
        }

        /* Success Screen */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>Ghadeer, will you go out on a date with me?</h1>
        
        <div class="image-container">
            <!-- Set your initial default image below -->
            <img id="reaction-img" src="PLACE_DEFAULT_IMAGE_HERE.png" alt="Reaction" style="display: block;">
        </div>

        <div class="buttons-container">
            <button id="btn-yes">Yes</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <div class="success-screen" id="success-screen">
        <h1>I knew you'd say Yes, Ghadeer! ❤️</h1>
        <div class="image-container">
            <!-- Set your final success image below -->
            <img src="PLACE_SUCCESS_IMAGE_HERE.png" alt="Happy" style="display: block; width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const reactionImg = document.getElementById('reaction-img');
        const mainContainer = document.getElementById('main-container');
        const successScreen = document.getElementById('success-screen');

        // State Tracking
        let noClickCount = 0;
        let yesScale = 0.6;
        let noScale = 1.5;

        // Data Arrays: Add your manual image paths here
        const reactions = [
            "PLACE_REACTION_IMAGE_1_HERE.jpg", 
            "PLACE_REACTION_IMAGE_2_HERE.jpg",
            "PLACE_REACTION_IMAGE_3_HERE.jpg",
            "PLACE_REACTION_IMAGE_4_HERE.jpg"
        ];

        const noTexts = [
            "Are you sure?",
            "Ghadeer, think again!",
            "Really?!",
            "You're breaking my heart!",
            "Okay, I'm hiding the No button."
        ];

        btnNo.addEventListener('click', () => {
            noClickCount++;

            // 1. Update the funny text on the No button
            const textIndex = Math.min(noClickCount - 1, noTexts.length - 1);
            btnNo.innerText = noTexts[textIndex];

            // 2. Update the reaction image
            const imgIndex = Math.min(noClickCount - 1, reactions.length - 1);
            reactionImg.src = reactions[imgIndex];
            reactionImg.style.display = 'block';

            // 3. Mathematical scale adjustment (Weird & Funny Logic)
            yesScale += 0.8; // Yes gets massively bigger
            noScale -= 0.3;  // No gets smaller

            btnYes.style.transform = `scale(${yesScale})`;
            
            if (noScale <= 0) {
                btnNo.style.display = 'none'; // Hide completely if it gets too small
            } else {
                btnNo.style.transform = `scale(${noScale})`;
            }
        });

        btnYes.addEventListener('click', () => {
            // Transition to success screen
            mainContainer.style.display = 'none';
            successScreen.style.display = 'flex';
        });
    </script>
</body>
</html>
